<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>
  <link rel="stylesheet" href="Cstyle.css">
</head>

<body> 

        <header class="header">
            <input type="checkbox" id="menu">
            <label for="menu">
                <img src="img/menu.png" class="menu-icono" alt="">
            </label>
            <nav class="navbar">
                <ul>
                    <li><a href="Index.html">Inicio</a></li>
                    <li><a href="#">Servicios</a></li>
                    <li><a href="#">Productos</a></li>
                    <li><a href="Contacto.html">Contacto</a></li>
                </ul>
            </nav>


            
  <div class="container">

    <form class="form">
      <h3>Escribenos</h3>
      <p>
        En Doggie Chic Studio
        y en un lapso corto de tiempo
        recibiras tu respuesta canina.
      </p>

      <label for="nombre">Escribe tu nombre</label>
      <input type="text" id="nombre" class="box">

      <label for="correo">Escribe tu correo</label>
      <input type="email" id="correo" class="box">

      <label for="mensaje">Escribe tu mensaje</label>
      <textarea class="box" id="mensaje" cols="30" rows="10"></textarea>

      <input type="submit" value="enviar" class="submit">
    </form>

    <div class="info">
      <img src="img/info-1.svg" class="img-1" alt="">

      <div class="location">
        <div class="icons">
          <img src="img/gps.svg" alt="">
          <p>Av Paseo de los Leones 2048, Cumbres 2o. Sector Secc C, 64610 Monterrey, N.L.</p>
        </div>

        <div class="icons">
          <img src="img/number.svg" alt="">
          <p>81 4006 2762</p>
        </div>

        <div class="icons">
          <img src="img/email.svg" alt="">
          <p>doggiechicstudio@gmail.com</p>
        </div>
      </div>

      <div class="social">
        <img src="img/fa.svg" alt="">
        <img src="img/tw.svg" alt="">
        <img src="img/ins.svg" alt="">
      </div>
    </div>

  </div>
</body>
